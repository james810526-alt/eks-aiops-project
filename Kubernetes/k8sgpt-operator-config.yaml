apiVersion: v1
kind: Namespace
metadata:
  name: aiops
  labels:
    project: nkc201-17
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8sgpt-sa
  namespace: aiops
---
apiVersion: v1
kind: Secret
metadata:
  name: k8sgpt-webhook-secret
  namespace: aiops
type: Opaque
stringData:
  # 請將下面的 <YOUR_API_GATEWAY_ENDPOINT> 替換為 Stack 08 Outputs 的 ApiEndpoint
  # 例如: https://abcde12345.execute-api.ap-south-1.amazonaws.com/webhook
  url: "https://<YOUR_API_GATEWAY_ENDPOINT>/webhook"
---
apiVersion: core.k8sgpt.ai/v1alpha1
kind: K8sGPT
metadata:
  name: k8sgpt-aiops
  namespace: aiops
spec:
  # 1. 設置 AI 診斷後台 (整合 AWS Bedrock)
  # 當工程師在 EKS 內手動執行 k8sgpt analyze --explain 時，將使用此 Bedrock 模型進行診斷
  ai:
    enabled: true
    backend: amazonbedrock
    model: anthropic.claude-3-haiku-20240307-v1:0
    secret:
      # AWS Bedrock 採用 Pod Identity IAM Role 授權，無需填寫靜態 secrets 金鑰，保留空 Secret 或預設即可
      name: ""
      key: ""
  
  # 2. 指定運行的 ServiceAccount (對應 Stack 07 的 Pod Identity 綁定)
  serviceAccountName: k8sgpt-sa

  # 3. 設置過濾器 (只針對核心元件進行掃描以收斂噪音)
  filters:
    - Pod
    - Service
    - Ingress
    - ReplicaSet

  # 4. 設置 Webhook Sink (自動將偵測到的異常傳送至 API Gateway Webhook 觸發自動修復)
  sink:
    type: webhook
    # 引用上方 Secret 的 URL，確保敏感的端點不被明文寫入 YAML 中
    secret:
      name: k8sgpt-webhook-secret
      key: url
