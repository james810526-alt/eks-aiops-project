AWSTemplateFormatVersion: '2010-09-09'
Description: IAM Roles Stack for EKS Cluster, Nodes, ALB Controller, S3, K8sGPT, Engineers, and CodeBuild.

Parameters:
  ProjectName:
    Type: String
    Default: eks-aiops-demo
    Description: Project name used for resource naming

Resources:
  # =========================================================================
  # 1. EKS Cluster Role (EKS 控制面角色：讓 AWS 管理 K8s 叢集)
  # =========================================================================
  EksClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-eks-cluster-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-eks-cluster-role"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 2. EKS Node Role (EKS 節點角色：讓 EC2 節點加入 K8s 叢集、拉取映像檔、支援 SSM)
  # =========================================================================
  EksNodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-eks-node-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore # 支援 SSM 免密碼 SSH 進去
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-eks-node-role"
        - Key: Project
          Value: nkc201-17

  EksNodeInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-eks-node-instance-profile"
      Roles:
        - !Ref EksNodeRole

  # =========================================================================
  # 3. ALB Controller Role (負載平衡控制器角色：建立與管理外部 ALB)
  # =========================================================================
  AlbControllerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-alb-controller-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com  # 支援 EKS Pod Identity
            Action: 
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: EKSALBControllerPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateServiceLinkedRole
                Resource: '*'
                Condition:
                  StringEquals:
                    iam:AWSServiceName: elasticloadbalancing.amazonaws.com
              - Effect: Allow
                Action:
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeAddresses
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeInternetGateways
                  - ec2:DescribeVpcs
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeInstances
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DescribeTags
                  - ec2:GetCoipPoolUsage
                  - ec2:DescribeCoipPools
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeListenerAttributes
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeTags
                  - cognito-idp:DescribeUserPoolClient
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                  - iam:ListServerCertificates
                  - iam:GetServerCertificate
                  - waf-regional:GetWebACL
                  - waf-regional:GetWebACLForResource
                  - waf-regional:AssociateWebACL
                  - waf-regional:DisassociateWebACL
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                  - wafv2:AssociateWebACL
                  - wafv2:DisassociateWebACL
                  - shield:GetSubscriptionState
                  - shield:DescribeProtection
                  - shield:CreateProtection
                  - shield:DeleteProtection
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:CreateSecurityGroup
                  - ec2:DeleteSecurityGroup
                Resource: '*'
              - Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:SetIpAddressType
                  - elasticloadbalancing:SetSecurityGroups
                  - elasticloadbalancing:SetSubnets
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:CreateRule
                  - elasticloadbalancing:DeleteRule
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:ModifyRule
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-controller-role"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 4. App S3 Role (網頁 Pod 存取 S3 角色：讓 Pod 讀寫網頁靜態資源)
  # =========================================================================
  AppS3Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-app-s3-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action: 
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: PodS3AccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetBucketLocation
                Resource: !Sub "arn:aws:s3:::${ProjectName}-${AWS::AccountId}-data-bucket"
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${ProjectName}-${AWS::AccountId}-data-bucket/*"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-app-s3-role"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 5. K8sGPT / AI Role (智能維運角色：分析問題、調用 Bedrock、發送 SNS 告警)
  # =========================================================================
  K8sGptRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-k8sgpt-ai-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: pods.eks.amazonaws.com
            Action: 
              - sts:AssumeRole
              - sts:TagSession
      Policies:
        - PolicyName: K8sGptAIAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              # 1. 允許分析診斷呼叫 Bedrock LLM 服務
              - Effect: Allow
                Action:
                  - bedrock:InvokeModel
                  - bedrock:InvokeModelWithResponseStream
                Resource: 'arn:aws:bedrock:*::foundation-model/*'
              # 2. 允許透過 SNS 發送告警郵件
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Sub "arn:aws:sns:${AWS::Region}:${AWS::AccountId}:${ProjectName}-alerts-topic"
              # 3. 允許讀寫診斷報告至 S3
              - Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:GetObject
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${ProjectName}-${AWS::AccountId}-data-bucket"
                  - !Sub "arn:aws:s3:::${ProjectName}-${AWS::AccountId}-data-bucket/*"
              # 4. 允許從 Secrets Manager 讀取 LINE 等 API 金鑰
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${ProjectName}-rds-secret-*"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-k8sgpt-ai-role"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 6. Engineer Role (維運工程師角色：供工程師切換以管理 EKS)
  # =========================================================================
  EngineerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-engineer-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root" # 允許同帳號內的 IAM 使用者/角色 Assume
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EKSReadWriteAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                  - eks:ListClusters
                  - eks:ListNodegroups
                  - eks:DescribeNodegroup
                  - eks:ListUpdates
                  - eks:DescribeUpdate
                  - eks:AccessKubernetesApi
                Resource: '*'
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-engineer-role"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 7. CodeBuild Role (自動修復角色：讓 CI/CD 執行 kubectl 修正部署)
  # =========================================================================
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-codebuild-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              ArnLike:
                aws:SourceArn: !Sub "arn:aws:codebuild:${AWS::Region}:${AWS::AccountId}:project/${ProjectName}-*"
      Policies:
        - PolicyName: CodeBuildBasePolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: 'arn:aws:logs:*:*:*'
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                Resource:
                  - !Sub "arn:aws:s3:::${ProjectName}-${AWS::AccountId}-data-bucket"
                  - !Sub "arn:aws:s3:::${ProjectName}-${AWS::AccountId}-data-bucket/*"
              - Effect: Allow
                Action:
                  - eks:DescribeCluster
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterface
                  - ec2:DescribeDhcpOptions
                  - ec2:DescribeNetworkInterfaces
                  - ec2:DeleteNetworkInterface
                  - ec2:DescribeSubnets
                  - ec2:DescribeSecurityGroups
                  - ec2:DescribeVpcs
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:CreateNetworkInterfacePermission
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:network-interface/*"
                Condition:
                  StringEquals:
                    ec2:AuthorizedService: codebuild.amazonaws.com
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-codebuild-role"
        - Key: Project
          Value: nkc201-17

# =========================================================================
# Outputs
# =========================================================================
Outputs:
  EksClusterRoleArn:
    Description: ARN for EKS Cluster Role
    Value: !GetAtt EksClusterRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EksClusterRoleArn"

  EksNodeRoleArn:
    Description: ARN for EKS Node Role
    Value: !GetAtt EksNodeRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EksNodeRoleArn"

  EksNodeInstanceProfileName:
    Description: Name for EKS Node Instance Profile
    Value: !Ref EksNodeInstanceProfile
    Export:
      Name: !Sub "${AWS::StackName}-EksNodeInstanceProfileName"

  AlbControllerRoleArn:
    Description: ARN for ALB Controller Role
    Value: !GetAtt AlbControllerRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AlbControllerRoleArn"

  AppS3RoleArn:
    Description: ARN for App S3 Role
    Value: !GetAtt AppS3Role.Arn
    Export:
      Name: !Sub "${AWS::StackName}-AppS3RoleArn"

  K8sGptRoleArn:
    Description: ARN for K8sGPT AI Role
    Value: !GetAtt K8sGptRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-K8sGptRoleArn"

  EngineerRoleArn:
    Description: ARN for Engineer Role
    Value: !GetAtt EngineerRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-EngineerRoleArn"

  CodeBuildRoleArn:
    Description: ARN for CodeBuild Role
    Value: !GetAtt CodeBuildRole.Arn
    Export:
      Name: !Sub "${AWS::StackName}-CodeBuildRoleArn"
