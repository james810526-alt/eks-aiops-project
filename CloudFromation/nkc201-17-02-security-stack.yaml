AWSTemplateFormatVersion: '2010-09-09'
Description: Security Groups Stack for EKS Cluster, ALB, Node Group and RDS Database

Parameters:
  ProjectName:
    Type: String
    Default: eks-aiops-demo
    Description: Project name used for resource naming

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID where security groups will be created

  DatabasePort:
    Type: Number
    Default: 3306
    AllowedValues: [3306, 5432]
    Description: Port of the database (3306 for MySQL, 5432 for PostgreSQL)

Resources:
  # =========================================================================
  # 1. ALB Security Group (社區大門：允許外部 HTTP/HTTPS 流量進來)
  # =========================================================================
  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for Application Load Balancer (ALB)
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from internet
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-alb-sg"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 2. EKS Cluster Security Group (大樓經理室：管理 EKS 控制面)
  # =========================================================================
  EksClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EKS Cluster Control Plane
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-eks-cluster-sg"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 3. EKS Node Security Group (員工辦公區：工作節點與 Pod 運行的地方)
  # =========================================================================
  EksNodeSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for EKS Worker Nodes
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-eks-node-sg"
        - Key: Project
          Value: nkc201-17

  # 允許節點內部互相通訊 (Self-reference rule: 同一辦公區內互信)
  EksNodeSelfIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EksNodeSecurityGroup
      SourceSecurityGroupId: !Ref EksNodeSecurityGroup
      IpProtocol: -1 # -1 代表所有協議
      Description: Allow node-to-node and pod-to-pod communication

  # =========================================================================
  # 4. RDS Security Group (保險金庫：只允許工作節點存取)
  # =========================================================================
  RdsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security Group for RDS Database Instance
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref DatabasePort
          ToPort: !Ref DatabasePort
          SourceSecurityGroupId: !Ref EksNodeSecurityGroup
          Description: Allow database access only from EKS nodes
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-rds-sg"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 5. 動態插入互聯規則 (解決 EKS Cluster 與 Node 的雙向通訊循環相依)
  # =========================================================================

  # ALB -> Nodes (大門 -> 辦公區): 允許 ALB 將流量導向節點/Pod 上的任何 TCP 埠口 (支持各種容器埠與健康檢查)
  AlbToNodeIngressAllTCP:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EksNodeSecurityGroup
      SourceSecurityGroupId: !Ref AlbSecurityGroup
      IpProtocol: tcp
      FromPort: 0
      ToPort: 65535
      Description: Allow ALB to talk to nodes on any TCP port for target routing

  # Cluster -> Nodes (經理室 -> 辦公區): 允許控制面發送指令給節點 (如 kubectl logs)
  ClusterToNodeIngress443:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EksNodeSecurityGroup
      SourceSecurityGroupId: !Ref EksClusterSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      Description: Allow EKS control plane to communicate with nodes on 443

  ClusterToNodeIngressEphemeral:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EksNodeSecurityGroup
      SourceSecurityGroupId: !Ref EksClusterSecurityGroup
      IpProtocol: tcp
      FromPort: 1025
      ToPort: 65535
      Description: Allow EKS control plane to communicate with pods on ephemeral ports

  # Nodes -> Cluster (辦公區 -> 經理室): 允許節點向控制面註冊註銷
  NodeToClusterIngress443:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EksClusterSecurityGroup
      SourceSecurityGroupId: !Ref EksNodeSecurityGroup
      IpProtocol: tcp
      FromPort: 443
      ToPort: 443
      Description: Allow nodes to talk to EKS API server

# =========================================================================
# Outputs
# =========================================================================
Outputs:
  AlbSecurityGroupId:
    Description: Security Group ID for ALB
    Value: !Ref AlbSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-AlbSecurityGroupId"

  EksClusterSecurityGroupId:
    Description: Security Group ID for EKS Cluster Control Plane
    Value: !Ref EksClusterSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-EksClusterSecurityGroupId"

  EksNodeSecurityGroupId:
    Description: Security Group ID for EKS Worker Nodes
    Value: !Ref EksNodeSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-EksNodeSecurityGroupId"

  RdsSecurityGroupId:
    Description: Security Group ID for RDS Database
    Value: !Ref RdsSecurityGroup
    Export:
      Name: !Sub "${AWS::StackName}-RdsSecurityGroupId"
