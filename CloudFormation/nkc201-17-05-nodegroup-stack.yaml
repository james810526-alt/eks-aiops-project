AWSTemplateFormatVersion: '2010-09-09'
Description: AWS EKS Managed Node Group Stack for cost-efficient student testing

Parameters:
  ProjectName:
    Type: String
    Default: eks-aiops-demo
    Description: Project name used for resource naming

  ClusterName:
    Type: String
    Default: eks-aiops-mumbai
    Description: Name of the existing EKS Cluster

  NodeRoleArn:
    Type: String
    Description: IAM Role ARN for EKS Node Group (from Stack 03)

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Select the 3 Private App Subnets where nodes will be launched (from Stack 01)

  InstanceTypes:
    Type: CommaDelimitedList
    Default: t3.medium
    Description: EC2 instance type for the EKS nodes (t3.medium is minimum required for system memory)

  DesiredSize:
    Type: Number
    Default: 2
    Description: Desired number of worker nodes (set to 2 for budget saving)

  MinSize:
    Type: Number
    Default: 2
    Description: Minimum number of worker nodes

  MaxSize:
    Type: Number
    Default: 4
    Description: Maximum number of worker nodes

  DiskSize:
    Type: Number
    Default: 20
    Description: Disk size in GB for node root volume (reduced to 20GB for cost-efficiency)

  IamStackName:
    Type: String
    Default: nkc201-17-03-iam-stack
    Description: Name of the IAM Stack to import Engineer Role ARN

  SecurityStackName:
    Type: String
    Default: nkc201-17-02-security-stack
    Description: Name of the Security Stack to import Node Security Group

  ClusterStackName:
    Type: String
    Default: nkc201-17-04-eks-cluster-stack
    Description: Name of the EKS Cluster Stack to import the EKS-managed Cluster Security Group

Resources:
  # =========================================================================
  # 1. Node Launch Template
  # A custom launch template is required to attach the project Node SG.
  # When custom SGs are provided, EKS does not automatically add its Cluster SG,
  # so both security groups are explicitly attached here.
  # =========================================================================
  EksNodeLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${ProjectName}-node-lt"
      LaunchTemplateData:
        SecurityGroupIds:
          - Fn::ImportValue: !Sub "${SecurityStackName}-EksNodeSecurityGroupId"
          - Fn::ImportValue: !Sub "${ClusterStackName}-ClusterSecurityGroupId"
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: !Ref DiskSize
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        MetadataOptions:
          HttpEndpoint: enabled
          HttpTokens: required
          HttpPutResponseHopLimit: 2
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "${ProjectName}-node"
              - Key: Project
                Value: nkc201-17
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: !Sub "${ProjectName}-node-volume"
              - Key: Project
                Value: nkc201-17
      TagSpecifications:
        - ResourceType: launch-template
          Tags:
            - Key: Name
              Value: !Sub "${ProjectName}-node-lt"
            - Key: Project
              Value: nkc201-17

  # =========================================================================
  # 2. EKS Managed Node Group (託管工作節點群組 - 工人的工作區)
  # =========================================================================
  EksNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      ClusterName: !Ref ClusterName
      NodegroupName: app-nodegroup
      NodeRole: !Ref NodeRoleArn
      Subnets: !Ref SubnetIds
      InstanceTypes: !Ref InstanceTypes
      ScalingConfig:
        DesiredSize: !Ref DesiredSize
        MinSize: !Ref MinSize
        MaxSize: !Ref MaxSize
      LaunchTemplate:
        Id: !Ref EksNodeLaunchTemplate
        Version: !GetAtt EksNodeLaunchTemplate.LatestVersionNumber
      AmiType: AL2023_x86_64_STANDARD # 使用 Amazon Linux 2023 (最新推薦的最佳實踐)
      Labels:
        role: worker
        project: nkc201-17
      Tags:
        Name: !Sub "${ProjectName}-node"
        Project: nkc201-17

  # =========================================================================
  # 3. CoreDNS Addon (負責 K8s 內部 DNS 解析，依賴工作節點存在以進行排程)
  # =========================================================================
  CoreDnsAddon:
    Type: AWS::EKS::Addon
    DependsOn: EksNodeGroup
    Properties:
      AddonName: coredns
      ClusterName: !Ref ClusterName
      ResolveConflicts: OVERWRITE

  # =========================================================================
  # 4. SSM Bastion Host IAM Role & Instance Profile (跳板機專用 IAM 角色與設定檔)
  # =========================================================================
  BastionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-bastion-role"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: AllowAssumeEngineerRole
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource:
                  Fn::ImportValue: !Sub "${IamStackName}-EngineerRoleArn"
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-bastion-role"
        - Key: Project
          Value: nkc201-17

  BastionInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${ProjectName}-bastion-instance-profile"
      Roles:
        - !Ref BastionRole

  # =========================================================================
  # 5. SSM Bastion Host (安全跳板機：無公網 IP、無開放 SSH、採用 SSM 登入，負責私有管理 EKS)
  # =========================================================================
  BastionHost:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      SubnetId: !Select [0, !Ref SubnetIds] # 部署於第一個 App 私有子網路中
      SecurityGroupIds:
        - Fn::ImportValue: !Sub "${SecurityStackName}-EksNodeSecurityGroupId" # 使用與 Node 相同的安全群組以直接連線 API Server
      IamInstanceProfile: !Ref BastionInstanceProfile
      ImageId: "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64}}" # 使用最新 AL2023 系統
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-bastion"
        - Key: Project
          Value: nkc201-17

# =========================================================================
# Outputs
# =========================================================================
Outputs:
  NodeLaunchTemplateId:
    Description: Launch Template ID used by the EKS managed node group
    Value: !Ref EksNodeLaunchTemplate
    Export:
      Name: !Sub "${AWS::StackName}-NodeLaunchTemplateId"

  NodegroupName:
    Description: The name of the EKS Node Group
    Value: !Ref EksNodeGroup
    Export:
      Name: !Sub "${AWS::StackName}-NodegroupName"

  NodegroupArn:
    Description: The ARN of the EKS Node Group
    Value: !GetAtt EksNodeGroup.Arn
    Export:
      Name: !Sub "${AWS::StackName}-NodegroupArn"

  BastionInstanceId:
    Description: The Instance ID of the SSM Bastion Host
    Value: !Ref BastionHost
    Export:
      Name: !Sub "${AWS::StackName}-BastionInstanceId"
