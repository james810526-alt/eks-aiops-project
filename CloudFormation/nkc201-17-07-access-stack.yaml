AWSTemplateFormatVersion: '2010-09-09'
Description: EKS Cluster Access Entry Stack to map IAM Roles to Kubernetes Policies and configure Pod Identity Associations

Parameters:
  ProjectName:
    Type: String
    Default: eks-aiops-demo
    Description: Project name used for resource naming

  ClusterStackName:
    Type: String
    Default: nkc201-17-04-eks-cluster-stack
    Description: The name of the EKS Cluster CloudFormation Stack to import ClusterName

  IamStackName:
    Type: String
    Default: nkc201-17-03-iam-stack
    Description: The name of the IAM CloudFormation Stack to import Role ARNs

Resources:
  # =========================================================================
  # 1. 授權工程師權限 (限縮在特定命名空間 web-prod 與 aiops)
  # =========================================================================
  EngineerAccessEntry:
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName:
        Fn::ImportValue: !Sub "${ClusterStackName}-ClusterName"
      PrincipalArn:
        Fn::ImportValue: !Sub "${IamStackName}-EngineerRoleArn"
      Type: STANDARD
      # 綁定 Kubernetes 權限策略
      AccessPolicies:
        # 1.1 在 web-prod 和 aiops 命名空間下擁有管理員 (Admin) 權限
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSAdminPolicy
          AccessScope:
            Type: namespace
            Namespaces:
              - web-prod
              - aiops
        # 1.2 在整個叢集級別擁有唯讀 (Viewer) 權限，便於查看 Node 狀態
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSViewPolicy
          AccessScope:
            Type: cluster
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-engineer-access"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 2. 授權 CI/CD 自動化修復權限 (EKS 叢集全域管理員)
  # =========================================================================
  CodeBuildAccessEntry:
    Type: AWS::EKS::AccessEntry
    Properties:
      ClusterName:
        Fn::ImportValue: !Sub "${ClusterStackName}-ClusterName"
      PrincipalArn:
        Fn::ImportValue: !Sub "${IamStackName}-CodeBuildRoleArn"
      Type: STANDARD
      AccessPolicies:
        # 2.1 限制在 web-prod 與 aiops 命名空間下擁有管理員 (Admin) 權限，避免對系統核心空間造成衝擊
        - PolicyArn: arn:aws:eks::aws:cluster-access-policy/AmazonEKSAdminPolicy
          AccessScope:
            Type: namespace
            Namespaces:
              - web-prod
              - aiops
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-codebuild-access"
        - Key: Project
          Value: nkc201-17

  # =========================================================================
  # 3. EKS Pod Identity Associations (對接 K8s ServiceAccount 與 IAM Role)
  # =========================================================================

  # 3.1 ALB Controller 權限綁定 (kube-system 命名空間)
  AlbControllerPodIdentity:
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName:
        Fn::ImportValue: !Sub "${ClusterStackName}-ClusterName"
      Namespace: kube-system
      ServiceAccount: aws-load-balancer-controller
      RoleArn:
        Fn::ImportValue: !Sub "${IamStackName}-AlbControllerRoleArn"

  # 3.2 網頁 Pod S3 權限綁定 (web-prod 命名空間)
  AppS3PodIdentity:
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName:
        Fn::ImportValue: !Sub "${ClusterStackName}-ClusterName"
      Namespace: web-prod
      ServiceAccount: web-app-sa
      RoleArn:
        Fn::ImportValue: !Sub "${IamStackName}-AppS3RoleArn"

  # 3.3 K8sGPT AI 權限綁定 (aiops 命名空間)
  K8sGptPodIdentity:
    Type: AWS::EKS::PodIdentityAssociation
    Properties:
      ClusterName:
        Fn::ImportValue: !Sub "${ClusterStackName}-ClusterName"
      Namespace: aiops
      ServiceAccount: k8sgpt-aiops
      RoleArn:
        Fn::ImportValue: !Sub "${IamStackName}-K8sGptRoleArn"

# =========================================================================
# Outputs
# =========================================================================
Outputs:
  EngineerAccessEntryArn:
    Description: ARN of the Engineer Access Entry
    Value: !GetAtt EngineerAccessEntry.AccessEntryArn
    Export:
      Name: !Sub "${AWS::StackName}-EngineerAccessEntryArn"

  CodeBuildAccessEntryArn:
    Description: ARN of the CodeBuild Access Entry
    Value: !GetAtt CodeBuildAccessEntry.AccessEntryArn
    Export:
      Name: !Sub "${AWS::StackName}-CodeBuildAccessEntryArn"
